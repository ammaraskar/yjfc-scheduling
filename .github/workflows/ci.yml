name: Run tests

on:
  push:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          version: 11
          cache: true
      - name: Install dependencies
        run: pnpm install
      - name: Run tests
        run: pnpm run test

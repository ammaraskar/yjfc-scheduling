<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Yellow Jacket Flying Club">
  <defs>
    <clipPath id="page"><rect x="5.6" y="11.9" width="20.8" height="14.7" rx="1.7"/></clipPath>
  </defs>
  <!-- binding rings -->
  <rect x="9.4" y="3" width="2.7" height="6.2" rx="1.35" fill="#4B515B"/>
  <rect x="19.9" y="3" width="2.7" height="6.2" rx="1.35" fill="#4B515B"/>
  <!-- gray calendar body -->
  <rect x="3.5" y="6.4" width="25" height="22.1" rx="3.2" fill="#6E7681"/>
  <!-- page split diagonally by the swoop -->
  <g clip-path="url(#page)">
    <!-- gold fills the page -->
    <rect x="5.6" y="11.9" width="20.8" height="14.7" fill="#C2A14A"/>
    <!-- navy fills the upper half, lower edge = swoop -->
    <path d="M5.6 11.9 L26.4 11.9 L26.4 14.8 C19 13.2 11 18.6 5.6 22.6 Z" fill="#152149"/>
    <!-- crisp livery pinstripe along the divide -->
    <path d="M26.4 14.8 C19 13.2 11 18.6 5.6 22.6" fill="none" stroke="#FFFFFF" stroke-width="0.7"/>
  </g>
</svg>
 